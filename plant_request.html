<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeStride - Plant Request Management</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap");
      * {
        box-sizing: border-box;
        font-family: "Exo 2", "Roboto";
        font-optical-sizing: auto;
        font-display: swap;
        font-style: normal;
        padding: 0;
        margin: 0;
      }
      body {
        background: #f4f7fa;
        color: #444;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: #fff;
        color: #444;
        padding: 1em;
      }
      header h1 {
        margin: 0;
      }
      .sign-out-button {
        background: none;
        border: none;
        color: #444;
        cursor: pointer;
        font-size: 1.2em;
        display: flex;
        align-items: center;
      }
      .sign-out-button i {
        margin-right: 0.5em;
      }
      main {
        padding: 2em;
      }
      .plant-requests-container {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 2em;
        margin-bottom: 2em;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 1em;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #f2f2f2;
      }
      .action-button {
        padding: 0.5em 1em;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        border-radius: 0.3em;
        background-color: #4aad5b;
        color: white;
        margin-right: 0.5em;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.4);
      }
      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
        max-width: 600px;
      }
      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }
      .close:hover,
      .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
      }
      #map {
        height: 300px;
        margin-top: 1em;
        margin-bottom: 1em;
      }
      /* Add pagination styles */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 1em;
        margin-top: 2em;
      }

      .pagination button {
        padding: 0.5em 1em;
        border: none;
        border-radius: 0.3em;
        background-color: #4aad5b;
        color: white;
        cursor: pointer;
      }

      .pagination button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .timestamp {
        font-size: 0.9em;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Plant Request Management</h1>
      <button class="sign-out-button" id="sign-out">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </header>
    <main>
      <div class="plant-requests-container">
        <h2>Plant Requests</h2>
        <table id="plant-requests-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Tree Name</th>
              <th>Tree Type</th>
              <th>Tree Cost</th>
              <th>Status</th>
              <th>Requested At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="plant-requests-body"></tbody>
        </table>
        <div class="pagination">
          <button id="prev-page" disabled>Previous</button>
          <span id="page-info">Page 1</span>
          <button id="next-page">Next</button>
        </div>
      </div>
    </main>

    <!-- Modal for updating plant request -->
    <div id="update-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Update Plant Request</h2>
        <form id="update-form">
          <label for="status">Status:</label>
          <select id="status" name="status">
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <br /><br />
          <div id="map"></div>
          <label for="lat">Latitude:</label>
          <input type="text" id="lat" name="lat" readonly />
          <br /><br />
          <label for="long">Longitude:</label>
          <input type="text" id="long" name="long" readonly />
          <br /><br />
          <button type="submit" class="action-button">Update</button>
        </form>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/ec19991922.js"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      // Import the necessary Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        getFirestore,
        collection,
        getDocs,
        doc,
        updateDoc,
        query,
        orderBy,
        limit,
        startAfter,
        endBefore,
        limitToLast,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAUIljfabkgsGO8FkLTfSNMpd7NeZW0a_M",
        authDomain: "treestride-project.firebaseapp.com",
        projectId: "treestride-project",
        storageBucket: "treestride-project.appspot.com",
        messagingSenderId: "218404996569",
        appId: "1:218404996569:web:d1daa406334c19cde5c5c8",
        measurementId: "G-XR01C3LFWD",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Check authentication state
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const email = user.email;
          if (email !== "admin@gmail.com") {
            alert("Unauthorized access. Redirecting to login.");
            window.location.href = "index.html";
          } else {
            fetchPlantRequests();
          }
        } else {
          alert("Redirecting to login.");
          window.location.href = "index.html";
        }
      });

      // Add pagination state
      const ITEMS_PER_PAGE = 10;
      let currentPage = 1;
      let lastVisible = null;
      let firstVisible = null;
      let totalPages = 0;

      let map;
      let marker;
      let currentPlantRequest;
      let selectedRequests = new Set();

      // Modified initMap function
      function initMap(lat = null, lng = null, existingMarker = null) {
        if (map) {
          map.remove();
        }

        if (existingMarker) {
          // Use existing marker location
          map = L.map("map").setView(
            [existingMarker.lat, existingMarker.lng],
            13
          );
          marker = L.marker([existingMarker.lat, existingMarker.lng]).addTo(
            map
          );
          updateCoordinateInputs(existingMarker.lat, existingMarker.lng);
        } else if (lat && lng) {
          // Use provided coordinates
          map = L.map("map").setView([lat, lng], 13);
          marker = L.marker([lat, lng]).addTo(map);
          updateCoordinateInputs(lat, lng);
        } else {
          // Get current location only if no existing marker
          map = L.map("map").setView([0, 0], 13);
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;
                map.setView([currentLat, currentLng], 13);
                marker = L.marker([currentLat, currentLng]).addTo(map);
                updateCoordinateInputs(currentLat, currentLng);
              },
              () => {
                console.error("Error getting location");
              }
            );
          }
        }

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }).addTo(map);

        map.on("click", onMapClick);
      }

      // Helper function to update coordinate inputs
      function updateCoordinateInputs(lat, lng) {
        document.getElementById("lat").value = lat.toFixed(6);
        document.getElementById("long").value = lng.toFixed(6);
      }

      // Modify fetchPlantRequests to include pagination
      async function fetchPlantRequests(direction = "next") {
        try {
          let q;

          if (direction === "next" && lastVisible) {
            q = query(
              collection(db, "plant_requests"),
              orderBy("timestamp", "desc"),
              startAfter(lastVisible),
              limit(ITEMS_PER_PAGE)
            );
          } else if (direction === "prev" && firstVisible) {
            q = query(
              collection(db, "plant_requests"),
              orderBy("timestamp", "desc"),
              endBefore(firstVisible),
              limitToLast(ITEMS_PER_PAGE)
            );
          } else {
            q = query(
              collection(db, "plant_requests"),
              orderBy("timestamp", "desc"),
              limit(ITEMS_PER_PAGE)
            );
          }

          const querySnapshot = await getDocs(q);

          if (!querySnapshot.empty) {
            lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
            firstVisible = querySnapshot.docs[0];

            const plantRequests = querySnapshot.docs.map((doc) => ({
              id: doc.id,
              ...doc.data(),
            }));

            displayPlantRequests(plantRequests);
            updatePaginationControls(querySnapshot);
          }
        } catch (error) {
          console.error("Error fetching plant requests:", error);
          alert("Error loading plant requests");
        }
      }

      // Update pagination controls
      function updatePaginationControls(querySnapshot) {
        const prevButton = document.getElementById("prev-page");
        const nextButton = document.getElementById("next-page");
        const pageInfo = document.getElementById("page-info");

        prevButton.disabled = currentPage === 1;
        nextButton.disabled = querySnapshot.docs.length < ITEMS_PER_PAGE;

        pageInfo.textContent = `Page ${currentPage}`;
      }

      // Display plant requests in the table
      function displayPlantRequests(plantRequests) {
        const tableBody = document.getElementById("plant-requests-body");
        tableBody.innerHTML = "";

        plantRequests.forEach((request) => {
          const timestamp = request.timestamp?.toDate() || new Date();
          const formattedDate = timestamp.toLocaleString();

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${request.username}</td>
            <td>${request.treeName}</td>
            <td>${request.treeType}</td>
            <td>${request.treeCost}</td>
            <td>${request.plantingStatus}</td>
            <td class="timestamp">${formattedDate}</td>
            <td>
              <button class="action-button update-button" data-id="${request.id}">Update</button>
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Add event listeners to update buttons
        const updateButtons = document.querySelectorAll(".update-button");
        updateButtons.forEach((button) => {
          button.addEventListener("click", (event) => {
            const requestId = event.target.getAttribute("data-id");
            openUpdateModal(requestId);
          });
        });
      }

      // Add pagination event listeners
      document.getElementById("prev-page").addEventListener("click", () => {
        currentPage--;
        fetchPlantRequests("prev");
      });

      document.getElementById("next-page").addEventListener("click", () => {
        currentPage++;
        fetchPlantRequests("next");
      });

      // Modify the openUpdateModal function to load existing data
      async function openUpdateModal(requestId) {
        const modal = document.getElementById("update-modal");
        modal.style.display = "block";

        try {
          // Fetch the current plant request data
          const querySnapshot = await getDocs(collection(db, "plant_requests"));
          const plantRequest = querySnapshot.docs
            .find((doc) => doc.id === requestId)
            ?.data();

          if (plantRequest) {
            currentPlantRequest = { ...plantRequest, id: requestId };

            // Set the current status
            document.getElementById("status").value =
              plantRequest.plantingStatus || "pending";

            // Initialize map with existing location if available
            if (plantRequest.locationLat && plantRequest.locationLong) {
              const lat = parseFloat(plantRequest.locationLat);
              const lng = parseFloat(plantRequest.locationLong);
              initMap(lat, lng, { lat, lng });
            } else {
              // If no location is set, use current location or default
              if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                  (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    initMap(lat, lng);
                  },
                  () => initMap()
                );
              } else {
                initMap();
              }
            }
          }
        } catch (error) {
          console.error("Error fetching plant request data:", error);
          initMap(); // Initialize map with default values if there's an error
        }

        // Set up form submission
        document.getElementById("update-form").onsubmit = (e) => {
          e.preventDefault();
          updatePlantRequest(requestId);
        };
      }

      // Update the onMapClick function to handle marker updates
      function onMapClick(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        // Update input fields
        document.getElementById("lat").value = lat;
        document.getElementById("long").value = lng;

        // Update or add marker
        if (marker) {
          marker.setLatLng(e.latlng);
        } else {
          marker = L.marker(e.latlng).addTo(map);
        }
      }

      // Clean up when closing the modal
      function closeModal() {
        document.getElementById("update-modal").style.display = "none";
        currentPlantRequest = null;
        if (marker) {
          marker.remove();
          marker = null;
        }
      }

      // Update the modal close button event listener
      document.querySelector(".close").onclick = closeModal;

      // Update the updatePlantRequest function
      async function updatePlantRequest(requestId) {
        const status = document.getElementById("status").value;
        const lat = document.getElementById("lat").value;
        const long = document.getElementById("long").value;

        if (!lat || !long) {
          alert("Please select a location on the map before updating.");
          return;
        }

        try {
          const requestRef = doc(db, "plant_requests", requestId);
          await updateDoc(requestRef, {
            plantingStatus: status,
            locationLat: lat,
            locationLong: long,
          });

          alert("Plant request updated successfully");
          closeModal();
          fetchPlantRequests(); // Refresh the table
        } catch (error) {
          console.error("Error updating plant request: ", error);
          alert("Failed to update plant request");
        }
      }

      // Sign out function
      const signOutButton = document.getElementById("sign-out");
      signOutButton.addEventListener("click", () => {
        signOut(auth)
          .then(() => {
            window.location.href = "index.html";
          })
          .catch((error) => {
            console.error("Error signing out: ", error);
          });
      });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeStride - Planting Requests</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap");

      * {
        box-sizing: border-box;
        font-family: "Exo 2", "Roboto";
        font-optical-sizing: auto;
        font-display: swap;
        font-style: normal;
        padding: 0;
        margin: 0;
      }

      :root {
        --primary-color: #38a169;
        --primary-hover: #2f855a;
        --danger-color: #e53e3e;
        --warning-color: #d69e2e;
        --text-primary: #2d3748;
        --text-secondary: #4a5568;
        --bg-primary: #f7fafc;
        --bg-secondary: #fff;
        --border-color: #e2e8f0;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
      }

      .sign-out-button {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 0.375rem;
        color: var(--text-primary);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .sign-out-button:hover {
        background: #edf2f7;
      }

      /* Navigation Styles */
      .navigation {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 250px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .navigation a {
        padding: 0.75rem 1rem;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 0.375rem;
        font-weight: 500;
        transition: all 0.2s;
      }

      .navigation a:hover {
        background: var(--bg-primary);
        color: var(--primary-color);
      }

      .navigation a i {
        margin-right: 0.4rem;
      }

      /* Main Content Styles */
      main {
        margin-left: 250px;
        padding: 1rem;
      }

      .plant-requests-container {
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 2em;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 1em;
        text-align: left;
        border-bottom: 1px solid #ddd;
        vertical-align: middle;
      }

      th {
        background-color: #f2f2f2;
      }

      .action-button {
        padding: 0.5em 1em;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        border-radius: 0.3em;
        background-color: #4aad5b;
        color: white;
        margin-right: 0.5em;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.4);
      }

      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
        max-width: 600px;
      }

      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      .close:hover,
      .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
      }

      #map {
        height: 300px;
        margin-top: 1em;
        margin-bottom: 1em;
      }

      /* Add pagination styles */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 1em;
        margin-top: 2em;
      }

      .pagination button {
        padding: 0.5em 1em;
        border: none;
        border-radius: 0.3em;
        background-color: #4aad5b;
        color: white;
        cursor: pointer;
      }

      .pagination button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      .timestamp {
        font-size: 0.9em;
        color: #666;
      }

      /* Add new styles for batch update features */
      .batch-controls {
        margin-bottom: 1em;
        display: flex;
        gap: 1em;
        align-items: center;
      }

      .checkbox-cell {
        width: 40px;
        text-align: center;
      }

      #batch-update-button {
        background-color: #4aad5b;
        color: white;
        padding: 0.5em 1em;
        border: none;
        border-radius: 0.3em;
        cursor: pointer;
        display: none;
      }

      #batch-update-button.visible {
        display: inline-block;
      }

      .select-all-container {
        display: flex;
        align-items: center;
        gap: 0.5em;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1em;
        color: #666;
        padding: 2em;
      }

      .empty-state i {
        font-size: 3em;
        color: #ccc;
      }
      .edit-button {
        padding: 0.5em 1em;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        border-radius: 0.3em;
        background-color: #3182ce; /* Blue color for edit */
        color: white;
        margin-right: 0.5em;
      }

      .edit-button:hover {
        background-color: #2c5282;
      }

      .status-cell {
        display: grid;
        vertical-align: middle;
        align-items: center;
        height: 120px;
      }

      header {
        padding: 1rem;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        justify-content: end;
        align-items: center;
        display: flex;
        gap: 0.4rem;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h3 style="color: #38a169">Admin</h3>
      <button class="sign-out-button" id="sign-out">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </header>
    <main>
      <section class="two-column">
        <section class="navigation">
          <img
            src="denr_logo.png"
            alt="DENR Dagupan Logo"
            height="120px"
            width="120px"
            style="margin: auto"
          />
          <h1
            style="
              font-size: 2rem;
              text-align: center;
              margin-bottom: 1rem;
              font-weight: bold;
            "
          >
            TreeStride
          </h1>
          <a href="main.html"
            ><i class="fas fa-users-gear"></i> Users (TreeStride)</a
          >
          <a href="manage_mission.html"
            ><i class="fas fa-tasks"></i> Manage Mission</a
          >
          <a href="announcements.html"
            ><i class="fas fa-bullhorn"></i> Announcements</a
          >
          <a href="manage_trees.html"
            ><i class="fas fa-tree"></i> Manage Trees (App)</a
          >
          <a href="planting_requests.html"
            ><i class="fas fa-seedling"></i> Planting Requests</a
          >
          <a href="tree_inventory.html"
            ><i class="fas fa-hand-paper"></i> Tree Inventory</a
          >
          <a href="reported_posts.html"
            ><i class="fas fa-exclamation-triangle"></i> Reported Posts</a
          >
        </section>

        <h1 style="text-align: left; font-size: 2rem; margin-bottom: 1.4rem">
          Planting Requests
        </h1>
        <div class="plant-requests-container">
          <div class="batch-controls">
            <div class="select-all-container">
              <input type="checkbox" id="select-all" />
              <label for="select-all">Select All Pending</label>
            </div>
            <button
              id="batch-update-button"
              class="action-button"
              style="margin-left: 1rem"
            >
              Update Selected Requests
            </button>
          </div>
          <table id="plant-requests-table">
            <thead>
              <tr>
                <th class="checkbox-cell"></th>
                <th>Username</th>
                <th>Tree Name</th>
                <th>Tree Type</th>
                <th>Tree Cost</th>
                <th>Status</th>
                <th>Requested At</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="plant-requests-body"></tbody>
          </table>
          <div class="pagination">
            <button id="prev-page" disabled>Previous</button>
            <span id="page-info">Page 1</span>
            <button id="next-page">Next</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Modified update modal -->
    <div id="update-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Update Plant Request(s)</h2>
        <form id="update-form">
          <label for="status">Status:</label>
          <select id="status" name="status">
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <br /><br />
          <div id="map"></div>
          <label for="lat">Latitude:</label>
          <input type="text" id="lat" name="lat" readonly />
          <br /><br />
          <label for="long">Longitude:</label>
          <input type="text" id="long" name="long" readonly />
          <br /><br />
          <p id="selected-count"></p>
          <button type="submit" class="action-button">Update</button>
        </form>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/ec19991922.js"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      // Import the necessary Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        getFirestore,
        collection,
        getDocs,
        doc,
        updateDoc,
        query,
        orderBy,
        limit,
        startAfter,
        endBefore,
        limitToLast,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAUIljfabkgsGO8FkLTfSNMpd7NeZW0a_M",
        authDomain: "treestride-project.firebaseapp.com",
        projectId: "treestride-project",
        storageBucket: "treestride-project.appspot.com",
        messagingSenderId: "218404996569",
        appId: "1:218404996569:web:d1daa406334c19cde5c5c8",
        measurementId: "G-XR01C3LFWD",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Check authentication state
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const email = user.email;
          if (email !== "admin@gmail.com") {
            alert("Unauthorized access. Redirecting to login.");
            window.location.href = "index.html";
          } else {
            fetchPlantRequests();
          }
        } else {
          alert("Redirecting to login.");
          window.location.href = "index.html";
        }
      });

      // Add pagination state
      const ITEMS_PER_PAGE = 10;
      let currentPage = 1;
      let lastVisible = null;
      let firstVisible = null;
      let totalPages = 0;

      let map;
      let marker;
      let currentPlantRequest;
      let selectedRequests = new Set();

      // Modified initMap function with clearer location priority
      function initMap(lat = null, lng = null, existingMarker = null) {
        if (map) {
          map.remove();
        }

        // Initialize map with default center (will be updated)
        map = L.map("map").setView([0, 0], 13);

        // Add tile layer
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution:
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        }).addTo(map);

        if (existingMarker) {
          // Case 1: Use existing marker location
          map.setView([existingMarker.lat, existingMarker.lng], 13);
          marker = L.marker([existingMarker.lat, existingMarker.lng]).addTo(
            map
          );
          updateCoordinateInputs(existingMarker.lat, existingMarker.lng);
        } else if (lat && lng) {
          // Case 2: Use provided coordinates
          map.setView([lat, lng], 13);
          marker = L.marker([lat, lng]).addTo(map);
          updateCoordinateInputs(lat, lng);
        } else {
          // Case 3: No existing coordinates, use device location
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;
                map.setView([currentLat, currentLng], 13);
                marker = L.marker([currentLat, currentLng]).addTo(map);
                updateCoordinateInputs(currentLat, currentLng);
              },
              () => {
                console.error("Error getting location");
                // Set default view if geolocation fails
                map.setView([0, 0], 13);
              }
            );
          }
        }

        map.on("click", onMapClick);
      }

      // Helper function to update coordinate inputs (unchanged)
      function updateCoordinateInputs(lat, lng) {
        document.getElementById("lat").value = lat.toFixed(6);
        document.getElementById("long").value = lng.toFixed(6);
      }

      async function fetchPlantRequests(direction = "next") {
        try {
          let q;
          const plantRequestsCollection = collection(db, "plant_requests");

          if (direction === "next" && lastVisible) {
            q = query(
              plantRequestsCollection,
              orderBy("timestamp", "desc"),
              startAfter(lastVisible),
              limit(ITEMS_PER_PAGE)
            );
          } else if (direction === "prev" && firstVisible) {
            q = query(
              plantRequestsCollection,
              orderBy("timestamp", "desc"),
              endBefore(firstVisible),
              limitToLast(ITEMS_PER_PAGE)
            );
          } else {
            // Default query for first page
            q = query(
              plantRequestsCollection,
              orderBy("timestamp", "desc"),
              limit(ITEMS_PER_PAGE)
            );
          }

          const querySnapshot = await getDocs(q);
          const docs = querySnapshot.docs;
          const paginationDiv = document.querySelector(".pagination");

          // Check if we have any documents
          if (docs.length > 0) {
            lastVisible = docs[docs.length - 1];
            firstVisible = docs[0];

            const plantRequests = docs.map((doc) => ({
              id: doc.id,
              ...doc.data(),
            }));

            displayPlantRequests(plantRequests);

            if (paginationDiv) {
              paginationDiv.style.display = "flex";
            }
            updatePaginationControls(querySnapshot);
          } else {
            // If no documents found and we're not on the first page
            if (currentPage > 1) {
              currentPage--;
              await fetchPlantRequests("prev");
            } else {
              // If we're on the first page and no documents
              displayPlantRequests([]);
              if (paginationDiv) {
                paginationDiv.style.display = "none";
              }
            }
          }
        } catch (error) {
          console.error("Error fetching plant requests:", error);
          alert("Error loading plant requests");
        }
      }

      // Update pagination controls
      function updatePaginationControls(querySnapshot) {
        const prevButton = document.getElementById("prev-page");
        const nextButton = document.getElementById("next-page");
        const pageInfo = document.getElementById("page-info");

        prevButton.disabled = currentPage === 1;
        nextButton.disabled = querySnapshot.docs.length < ITEMS_PER_PAGE;

        pageInfo.textContent = `Page ${currentPage}`;
      }

      function displayPlantRequests(plantRequests) {
        const tableBody = document.getElementById("plant-requests-body");
        const batchControls = document.querySelector(".batch-controls");
        tableBody.innerHTML = "";

        if (!plantRequests || plantRequests.length === 0) {
          const emptyRow = document.createElement("tr");
          emptyRow.innerHTML = `
      <td colspan="7" style="text-align: center;">
        <div class="empty-state">
          <i class="fa-regular fa-folder-open"></i>
          <p>No planting requests found</p>
        </div>
      </td>
    `;
          tableBody.appendChild(emptyRow);

          if (batchControls) {
            batchControls.style.display = "none";
          }
          return;
        }

        if (batchControls) {
          batchControls.style.display = "flex";
        }

        selectedRequests.clear();
        updateBatchControls();

        plantRequests.forEach((request) => {
          if (!request) return;

          const timestamp = request.timestamp?.toDate() || new Date();
          const formattedDate = timestamp.toLocaleString();
          const isPending = request.plantingStatus === "pending";
          const isApproved = request.plantingStatus === "approved";

          const row = document.createElement("tr");
          row.setAttribute("data-request-id", request.id);
          row.className = "row";
          row.innerHTML = `
      <td class="checkbox-cell">
        ${
          isPending
            ? `<input type="checkbox" class="request-checkbox" data-id="${request.id}"/>`
            : ""
        }
      </td>
      <td>${request.username || "N/A"}</td>
      <td>${request.treeName || "N/A"}</td>
      <td>${request.treeType || "N/A"}</td>
      <td>${request.treeCost || "N/A"}</td>
      <td class="status-cell" data-field="status">
          ${request.plantingStatus || "N/A"}
      </td>
      <td class="timestamp">${formattedDate}</td>
      <td>
        ${
          isPending || isApproved
            ? `<button class="edit-button" data-id="${request.id}">
                  <i class="fas fa-edit"></i> Edit
                </button>`
            : ""
        }
      </td>
    `;
          tableBody.appendChild(row);
        });

        // Setup event listeners after adding rows
        setupEventListeners();
      }

      // Setup event listeners for checkboxes and buttons
      function setupEventListeners() {
        // Edit buttons - Fixed implementation
        const editButtons = document.querySelectorAll(".edit-button");
        editButtons.forEach((button) => {
          button.addEventListener("click", function (event) {
            event.stopPropagation(); // Prevent event bubbling
            const requestId = this.getAttribute("data-id");
            openEditModal(requestId);
          });
        });

        // Checkbox change events
        const checkboxes = document.querySelectorAll(".request-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.addEventListener("change", handleCheckboxChange);
        });

        // Select all checkbox
        const selectAllCheckbox = document.getElementById("select-all");
        selectAllCheckbox.addEventListener("change", handleSelectAll);

        // Batch update button
        const batchUpdateButton = document.getElementById(
          "batch-update-button"
        );
        batchUpdateButton.addEventListener("click", () => {
          if (selectedRequests.size > 0) {
            openUpdateModal(Array.from(selectedRequests));
          }
        });
      }

      // Handle individual checkbox changes
      function handleCheckboxChange(event) {
        const requestId = event.target.getAttribute("data-id");
        if (event.target.checked) {
          selectedRequests.add(requestId);
        } else {
          selectedRequests.delete(requestId);
        }
        updateBatchControls();
      }

      // Handle select all checkbox
      function handleSelectAll(event) {
        const checkboxes = document.querySelectorAll(".request-checkbox");
        checkboxes.forEach((checkbox) => {
          checkbox.checked = event.target.checked;
          const requestId = checkbox.getAttribute("data-id");
          if (event.target.checked) {
            selectedRequests.add(requestId);
          } else {
            selectedRequests.delete(requestId);
          }
        });
        updateBatchControls();
      }

      // Update batch controls visibility
      function updateBatchControls() {
        const batchUpdateButton = document.getElementById(
          "batch-update-button"
        );
        batchUpdateButton.classList.toggle(
          "visible",
          selectedRequests.size > 0
        );
      }

      // Add pagination event listeners
      document.getElementById("prev-page").addEventListener("click", () => {
        currentPage--;
        fetchPlantRequests("prev");
      });

      document.getElementById("next-page").addEventListener("click", () => {
        currentPage++;
        fetchPlantRequests("next");
      });

      // Modified openUpdateModal function to handle coordinates
      async function openUpdateModal(requestIds) {
        const modal = document.getElementById("update-modal");
        modal.style.display = "block";

        document.getElementById(
          "selected-count"
        ).textContent = `Selected Requests: ${requestIds.length}`;

        try {
          // Get the first request's details to check for existing coordinates
          const requestRef = doc(db, "plant_requests", requestIds[0]);
          const requestDoc = await getDoc(requestRef);
          const requestData = requestDoc.data();

          // Initialize map based on existing coordinates or device location
          if (requestData.locationLat && requestData.locationLong) {
            // Use saved coordinates
            initMap(
              parseFloat(requestData.locationLat),
              parseFloat(requestData.locationLong),
              {
                lat: parseFloat(requestData.locationLat),
                lng: parseFloat(requestData.locationLong),
              }
            );
          } else {
            // No saved coordinates, initialize with device location
            initMap();
          }

          // Set up form submission for batch update
          document.getElementById("update-form").onsubmit = (e) => {
            e.preventDefault();
            updatePlantRequests(requestIds);
          };
        } catch (error) {
          console.error("Error opening update modal:", error);
          alert("Error opening update modal");
        }
      }

      async function openEditModal(requestId) {
        const modal = document.getElementById("update-modal");
        if (!modal) {
          console.error("Modal element not found");
          return;
        }

        try {
          // Get the request's current details
          const requestRef = doc(db, "plant_requests", requestId);
          const requestDoc = await getDoc(requestRef);

          if (!requestDoc.exists()) {
            throw new Error("Request not found");
          }

          const requestData = requestDoc.data();

          // Display the modal
          modal.style.display = "block";

          // Update modal content
          document.getElementById("selected-count").textContent =
            "Editing Request";
          document.getElementById("status").value =
            requestData.plantingStatus || "pending";

          // Initialize map with existing coordinates or default
          if (requestData.locationLat && requestData.locationLong) {
            initMap(
              parseFloat(requestData.locationLat),
              parseFloat(requestData.locationLong),
              {
                lat: parseFloat(requestData.locationLat),
                lng: parseFloat(requestData.locationLong),
              }
            );
          } else {
            initMap();
          }

          // Set up form submission
          const form = document.getElementById("update-form");
          form.onsubmit = (e) => {
            e.preventDefault();
            updatePlantRequest(requestId);
          };
        } catch (error) {
          console.error("Error opening edit modal:", error);
          alert(`Error opening edit modal: ${error.message}`);
        }
      }

      // Update the onMapClick function to handle marker updates
      function onMapClick(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        // Update input fields
        document.getElementById("lat").value = lat;
        document.getElementById("long").value = lng;

        // Update or add marker
        if (marker) {
          marker.setLatLng(e.latlng);
        } else {
          marker = L.marker(e.latlng).addTo(map);
        }
      }

      async function updatePlantRequests(requestIds) {
        const status = document.getElementById("status").value;
        const lat = document.getElementById("lat").value;
        const long = document.getElementById("long").value;

        if (!lat || !long) {
          alert("Please select a location on the map before updating.");
          return;
        }

        try {
          // Update each selected request
          const updatePromises = requestIds.map((requestId) => {
            const requestRef = doc(db, "plant_requests", requestId);
            return updateDoc(requestRef, {
              plantingStatus: status,
              locationLat: lat,
              locationLong: long,
              timestamp: new Date(), // Update timestamp to maintain proper ordering
            });
          });

          await Promise.all(updatePromises);

          // Reset UI state
          selectedRequests.clear();
          updateBatchControls();
          closeModal();

          // Show success message
          alert("Plant requests updated successfully");

          // Reset pagination state and fetch fresh data
          currentPage = 1;
          lastVisible = null;
          firstVisible = null;
          await fetchPlantRequests();
        } catch (error) {
          console.error("Error updating plant requests: ", error);
          alert("Failed to update plant requests");
        }
      }

      // Clean up when closing the modal
      function closeModal() {
        document.getElementById("update-modal").style.display = "none";
        currentPlantRequest = null;
        if (marker) {
          marker.remove();
          marker = null;
        }
      }

      async function updatePlantRequest(requestId) {
        const status = document.getElementById("status").value;
        const lat = document.getElementById("lat").value;
        const long = document.getElementById("long").value;

        if (!lat || !long) {
          alert("Please select a location on the map before updating.");
          return;
        }

        try {
          const requestRef = doc(db, "plant_requests", requestId);
          await updateDoc(requestRef, {
            plantingStatus: status,
            locationLat: lat,
            locationLong: long,
          });

          closeModal();
          alert("Plant request updated successfully");

          // Reset pagination state and fetch fresh data
          currentPage = 1;
          lastVisible = null;
          firstVisible = null;
          await fetchPlantRequests();
        } catch (error) {
          console.error("Error updating plant request: ", error);
          alert("Failed to update plant request");
        }
      }

      // Update the modal close button event listener
      document.querySelector(".close").onclick = closeModal;
    </script>
  </body>
</html>

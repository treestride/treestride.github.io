<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeStride - Announcements Management</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap");
      * {
        box-sizing: border-box;
        font-family: "Exo 2", "Roboto";
        font-optical-sizing: auto;
        font-display: swap;
        font-style: normal;
        padding: 0;
        margin: 0;
      }
      body {
        background: #f4f7fa;
        color: #444;
        padding: 20px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: #fff;
        color: #444;
        padding: 1em;
        margin-bottom: 20px;
      }
      header h1 {
        margin: 0;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        margin-bottom: 20px;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      label {
        margin-top: 10px;
      }
      input[type="text"],
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      #map {
        height: 300px;
        margin-top: 10px;
      }
      button {
        margin-top: 20px;
        padding: 10px;
        background-color: #3a9249;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #4fbb61;
      }
      #announcements {
        margin-top: 40px;
      }
      .announcement {
        position: relative;
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 4px;
      }
      .announcement img {
        max-width: 100%;
        height: auto;
        margin-top: 10px;
      }
      .announcement-map {
        height: 200px;
        margin-top: 10px;
      }
      .action-buttons {
        position: absolute;
        top: 10px;
        right: 10px;
      }
      .edit-btn,
      .delete-btn {
        margin-left: 5px;
        padding: 5px 10px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .delete-btn {
        background-color: #f44336;
      }
      #see-more-btn {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        background-color: #3a9249;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #see-more-btn:hover {
        background-color: #4fbb61;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Announcements Management</h1>
      <button id="back-to-dashboard">Back to Dashboard</button>
    </header>
    <div class="container">
      <h2>Create New Announcement</h2>
      <form id="announcement-form">
        <label for="title">Title:</label>
        <input type="text" id="title" required />

        <label for="content">Content:</label>
        <textarea id="content" rows="4" required></textarea>

        <label for="image">Image (optional):</label>
        <input type="file" id="image" accept="image/*" />

        <label for="location">Location (optional):</label>
        <div id="map"></div>
        <input type="hidden" id="location" />

        <button type="submit">Post Announcement</button>
      </form>

      <div id="announcements">
        <h2>Current Announcements</h2>
        <!-- Announcements will be dynamically added here -->
      </div>
      <button id="see-more-btn" style="display: none">See More</button>
    </div>

    <script type="module">
      // Import the necessary Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        getDocs,
        Timestamp,
        query,
        orderBy,
        limit,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAUIljfabkgsGO8FkLTfSNMpd7NeZW0a_M",
        authDomain: "treestride-project.firebaseapp.com",
        projectId: "treestride-project",
        storageBucket: "treestride-project.appspot.com",
        messagingSenderId: "218404996569",
        appId: "1:218404996569:web:d1daa406334c19cde5c5c8",
        measurementId: "G-XR01C3LFWD",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const storage = getStorage(app);

      let lastVisible = null;
      const ANNOUNCEMENTS_PER_PAGE = 5;

      // Initialize map
      let map = L.map("map").setView([0, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      let marker;
      map.on("click", function (e) {
        if (marker) {
          map.removeLayer(marker);
        }
        marker = L.marker(e.latlng).addTo(map);
        document.getElementById("location").value = JSON.stringify(e.latlng);
      });

      // Check authentication state
      onAuthStateChanged(auth, (user) => {
        if (user) {
          if (user.email !== "admin@gmail.com") {
            alert("Unauthorized access. Redirecting to login.");
            window.location.href = "index.html";
          } else {
            fetchAnnouncements();
          }
        } else {
          alert("You are not logged in. Redirecting to login.");
          window.location.href = "index.html";
        }
      });

      // Handle form submission
      document
        .getElementById("announcement-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const title = document.getElementById("title").value;
          const content = document.getElementById("content").value;
          const imageFile = document.getElementById("image").files[0];
          const locationString = document.getElementById("location").value;

          try {
            let imageUrl = "";
            if (imageFile) {
              const storageRef = ref(
                storage,
                "announcement_images/" + Date.now() + "_" + imageFile.name
              );
              await uploadBytes(storageRef, imageFile);
              imageUrl = await getDownloadURL(storageRef);
            }

            await addDoc(collection(db, "announcements"), {
              title,
              content,
              imageUrl,
              location: locationString ? JSON.parse(locationString) : null,
              timestamp: Timestamp.now(),
            });

            alert("Announcement posted successfully!");
            document.getElementById("announcement-form").reset();
            fetchAnnouncements();
          } catch (error) {
            console.error("Error posting announcement: ", error);
            alert("Failed to post announcement.");
          }
        });

      // Fetch and display announcements
      async function fetchAnnouncements(loadMore = false) {
        const announcementsDiv = document.getElementById("announcements");
        if (!loadMore) {
          announcementsDiv.innerHTML = "<h2>Current Announcements</h2>";
          lastVisible = null;
        }

        let q = query(
          collection(db, "announcements_test"),
          orderBy("timestamp", "desc"),
          limit(ANNOUNCEMENTS_PER_PAGE)
        );

        if (lastVisible) {
          q = query(
            collection(db, "announcements"),
            orderBy("timestamp", "desc"),
            startAfter(lastVisible),
            limit(ANNOUNCEMENTS_PER_PAGE)
          );
        }

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          document.getElementById("see-more-btn").style.display = "none";
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const announcementElement = createAnnouncementElement(doc.id, data);
          announcementsDiv.appendChild(announcementElement);
        });

        lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
        document.getElementById("see-more-btn").style.display =
          querySnapshot.size === ANNOUNCEMENTS_PER_PAGE ? "block" : "none";
      }

      function createAnnouncementElement(id, data) {
        const announcementElement = document.createElement("div");
        announcementElement.className = "announcement";
        announcementElement.id = `announcement-${id}`;

        let locationHtml = "";
        if (data.location) {
          const mapId = `map-${id}`;
          locationHtml = `<div id="${mapId}" class="announcement-map"></div>`;
        }

        announcementElement.innerHTML = `
          <div class="action-buttons">
            <button class="edit-btn" onclick="editAnnouncement('${id}')">Edit</button>
            <button class="delete-btn" onclick="deleteAnnouncement('${id}')">Delete</button>
          </div>
          <h3>${data.title}</h3>
          <p>${data.content}</p>
          ${
            data.imageUrl
              ? `<img src="${data.imageUrl}" alt="Announcement image">`
              : ""
          }
          ${locationHtml}
          <p>Posted on: ${data.timestamp.toDate().toLocaleString()}</p>
        `;

        if (data.location) {
          setTimeout(() => {
            const announcementMap = L.map(`map-${id}`).setView(
              [data.location.lat, data.location.lng],
              13
            );
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
              attribution: "© OpenStreetMap contributors",
            }).addTo(announcementMap);
            L.marker([data.location.lat, data.location.lng]).addTo(
              announcementMap
            );
          }, 0);
        }

        return announcementElement;
      }

      // Edit announcement function
      window.editAnnouncement = async (id) => {
        const docRef = doc(db, "announcements", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          document.getElementById("title").value = data.title;
          document.getElementById("content").value = data.content;
          document.getElementById("location").value = data.location
            ? JSON.stringify(data.location)
            : "";

          // Update the form submission to handle edits
          const form = document.getElementById("announcement-form");
          form.onsubmit = async (e) => {
            e.preventDefault();
            await updateAnnouncement(id);
          };

          // Scroll to the form
          form.scrollIntoView({ behavior: "smooth" });
        } else {
          console.log("No such document!");
        }
      };

      // Update announcement function
      async function updateAnnouncement(id) {
        const title = document.getElementById("title").value;
        const content = document.getElementById("content").value;
        const imageFile = document.getElementById("image").files[0];
        const locationString = document.getElementById("location").value;

        try {
          let imageUrl = "";
          if (imageFile) {
            const storageRef = ref(
              storage,
              "announcement_images/" + Date.now() + "_" + imageFile.name
            );
            await uploadBytes(storageRef, imageFile);
            imageUrl = await getDownloadURL(storageRef);
          }

          const docRef = doc(db, "announcements", id);
          await updateDoc(docRef, {
            title,
            content,
            ...(imageUrl && { imageUrl }),
            location: locationString ? JSON.parse(locationString) : null,
            timestamp: Timestamp.now(),
          });

          alert("Announcement updated successfully!");
          document.getElementById("announcement-form").reset();
          fetchAnnouncements();
        } catch (error) {
          console.error("Error updating announcement: ", error);
          alert("Failed to update announcement.");
        }
      }

      // Delete announcement function
      window.deleteAnnouncement = async (id) => {
        if (confirm("Are you sure you want to delete this announcement?")) {
          try {
            await deleteDoc(doc(db, "announcements", id));
            alert("Announcement deleted successfully!");
            document.getElementById(`announcement-${id}`).remove();
          } catch (error) {
            console.error("Error deleting announcement: ", error);
            alert("Failed to delete announcement.");
          }
        }
      };

      // Back to dashboard button
      document
        .getElementById("back-to-dashboard")
        .addEventListener("click", () => {
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeStride - Manage Trees</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap");
      * {
        box-sizing: border-box;
        font-family: "Exo 2", "Roboto";
        font-optical-sizing: auto;
        font-display: swap;
        font-style: normal;
        padding: 0;
        margin: 0;
      }

      :root {
        --primary-color: #38a169;
        --primary-hover: #2f855a;
        --danger-color: #e53e3e;
        --warning-color: #d69e2e;
        --text-primary: #2d3748;
        --text-secondary: #4a5568;
        --bg-primary: #f7fafc;
        --bg-secondary: #fff;
        --border-color: #e2e8f0;
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
      }

      .sign-out-button {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 0.375rem;
        color: var(--text-primary);
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .sign-out-button:hover {
        background: #edf2f7;
      }

      /* Navigation Styles */
      .navigation {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 250px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .navigation a {
        padding: 0.75rem 1rem;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 0.375rem;
        font-weight: 500;
        transition: all 0.2s;
      }

      .navigation a:hover {
        background: var(--bg-primary);
        color: var(--primary-color);
      }

      .navigation a i {
        margin-right: 0.4rem;
      }

      /* Main Content Styles */
      main {
        margin-left: 250px;
        padding: 1rem;
      }

      h1,
      h2,
      h3,
      h4,
      strong {
        color: #444;
      }

      form {
        display: grid;
        gap: 14px;
        width: 100%;
        margin-top: 20px;
      }

      label {
        margin-bottom: 5px;
        color: #444;
      }

      select,
      input,
      textarea,
      .modal button {
        width: 100%;
        padding: 12px;
        color: #444;
        font-size: 1em;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      #addTree,
      .modal button {
        cursor: pointer;
        background-color: #3a9249;
        color: white;
        border: none;
        padding: 6px;
        font-size: 1.1em;
        border-radius: 8px;
        transition: all 0.3s ease-in;
      }

      #addTree:hover {
        background-color: #4aad5b;
      }

      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: #fff;
        padding: 30px;
        border-radius: 12px;
        width: 90%;
        max-width: 480px;
        overflow-y: scroll;
      }

      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      .close:hover {
        color: #000;
      }

      .tree-list {
        width: 100%;
        max-width: 100%;
      }

      .tree-list h1 {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      .tree-item {
        display: grid;
        width: 100%;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        align-content: space-between;
        border-bottom: 1px solid #ddd;
      }

      .tree-item .image {
        max-width: 100%;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        height: 200px;
        overflow: hidden;
      }

      .tree-item img {
        object-fit: fill;
      }

      .tree-item button {
        background-color: #3a9249;
      }

      .three-column {
        display: flex;
        gap: 0.4rem;
      }

      .three-column div {
        display: grid;
        gap: 0.4rem;
        flex: 50%;
      }

      .three-column-btn {
        display: grid;
        grid-template-columns: 50% 50%;
        margin-top: 0.6rem;
        padding: 0 0.6rem 0.6rem 0.6rem;
      }

      .three-column-btn div {
        padding: 0.4rem;
      }

      #addTree {
        position: fixed;
        right: 5%;
        bottom: 5%;
        height: 64px;
        width: 64px;
        border-radius: 50%;
        font-size: 1.4rem;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        border: 2px solid #4aad5b;
      }

      .tree {
        display: flex;
        margin-top: 0.6rem;
      }

      .description {
        margin-top: 0.6rem;
      }

      .description p {
        height: 72px;
        max-height: 72px;
        overflow-y: scroll;
      }

      #currentImageLabel {
        font-size: 12px;
        white-space: pre;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tree-table {
        width: 100%;
        text-align: center;
        border-collapse: collapse;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background-color: #fff;
        border-radius: 8px;
      }

      .tree-table th,
      .tree-table td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
        color: #444;
      }

      .tree-table th {
        background-color: #3a9249;
        color: white;
        font-weight: bold;
      }

      .tree-table tbody tr:hover {
        background-color: #f4f7fa;
      }

      .tree-table img {
        width: 50px;
        height: auto;
        border-radius: 4px;
      }

      .tree-table button {
        background-color: #3a9249;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .tree-table td {
        vertical-align: middle;
      }

      .actions {
        display: grid;
        gap: 1rem;
      }

      .actions .delete {
        background-color: #f44336;
      }

      .two-column-modal {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .two-column-modal div {
        display: grid;
        gap: 0.4rem;
      }

      header {
        padding: 1rem;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        justify-content: end;
        align-items: center;
        display: flex;
        gap: 0.4rem;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h3 style="color: #38a169">Admin</h3>
      <button class="sign-out-button" id="sign-out">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </header>
    <main>
      <section class="two-column">
        <section class="navigation">
          <img
            src="denr_logo.png"
            alt="DENR Dagupan Logo"
            height="120px"
            width="120px"
            style="margin: auto"
          />
          <h1
            style="
              font-size: 2rem;
              text-align: center;
              margin-bottom: 1rem;
              font-weight: bold;
            "
          >
            TreeStride
          </h1>
          <button id="addTree"><i class="fa-solid fa-plus"></i></button>
          <a href="main.html"
            ><i class="fas fa-users-gear"></i> Users (TreeStride)</a
          >
          <a href="announcements.html"
            ><i class="fas fa-bullhorn"></i> Announcements</a
          >
          <a href="manage_mission.html"
            ><i class="fas fa-tasks"></i> Manage Mission</a
          >
          <a href="manage_trees.html"
            ><i class="fas fa-tree"></i> Manage Trees (App)</a
          >
          <a href="planting_requests.html"
            ><i class="fas fa-seedling"></i> Planting Requests</a
          >
          <a href="tree_inventory.html"
            ><i class="fas fa-hand-paper"></i> Tree Inventory</a
          >
          <a href="reported_posts.html"
            ><i class="fas fa-exclamation-triangle"></i> Reported Posts</a
          >
        </section>

        <section class="tree-list">
          <h1 style="text-align: left; font-size: 2rem; margin-bottom: 1.4rem">
            Tree List (App)
          </h1>
          <table id="treeTable" class="tree-table">
            <thead>
              <tr>
                <th>Tree Name</th>
                <th>Image</th>
                <th>Description</th>
                <th>Points Cost</th>
                <th>Type</th>
                <th>Alloted Trees</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="treeItems"></tbody>
          </table>
        </section>
      </section>
    </main>

    <!-- Tree Modal -->
    <div id="treeModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <form id="treeForm">
          <input type="hidden" id="treeId" />
          <div class="two-column-modal">
            <div>
              <label for="treeName">Tree Name:</label>
              <input
                type="text"
                id="treeName"
                name="treeName"
                placeholder="Tree Name"
                aria-label="Enter Tree Name"
                required
              />
            </div>
            <div>
              <label for="treeType">Type:</label>
              <select
                id="treeType"
                name="treeType"
                aria-label="Select Tree Type"
              >
                <option value="non-bearing">Non-bearing</option>
                <option value="bearing">Bearing</option>
              </select>
            </div>
          </div>

          <label for="treeDescription">Description:</label>
          <textarea
            type="text"
            id="treeDescription"
            name="treeDescription"
            rows="4"
            placeholder="Tree Description"
            aria-label="Enter Tree Description"
            required
          ></textarea>
          <div class="three-column">
            <div>
              <label for="treeCost">Tree Cost:</label>
              <input
                type="number"
                id="treeCost"
                name="treeCost"
                placeholder="Tree Cost"
                aria-label="Enter Tree Cost"
                required
              />
            </div>

            <div>
              <label for="availableTrees">Alloted Trees:</label>
              <input
                type="number"
                id="availableTrees"
                name="availableTrees"
                placeholder="Number of Available Trees"
                aria-label="Enter Number of Available Trees"
                required
              />
            </div>
          </div>
          <label for="treeImage">Upload Tree Image:</label>
          <input
            type="file"
            id="treeImage"
            name="treeImage"
            accept="image/*"
            aria-label="Upload Image"
          />

          <span id="currentImageLabel"></span>
          <input type="hidden" id="treeImage" name="treeImage" />
          <input
            type="hidden"
            id="existingTreeImage"
            name="existingTreeImage"
          />
          <button type="button" id="saveTree">SAVE</button>
        </form>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/ec19991922.js"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        collection,
        addDoc,
        deleteDoc,
        updateDoc,
        getDocs,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAUIljfabkgsGO8FkLTfSNMpd7NeZW0a_M",
        authDomain: "treestride-project.firebaseapp.com",
        projectId: "treestride-project",
        storageBucket: "treestride-project.appspot.com",
        messagingSenderId: "218404996569",
        appId: "1:218404996569:web:d1daa406334c19cde5c5c8",
        measurementId: "G-XR01C3LFWD",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const storage = getStorage(app);
      const treesCollectionRef = collection(db, "trees");

      // Check authentication state
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const email = user.email;
          if (email !== "admin@gmail.com") {
            alert("Unauthorized access. Redirecting to login.");
            window.location.href = "index.html";
          }
        } else {
          alert("Redirecting to login.");
          window.location.href = "index.html";
        }
      });

      window.onload = () => {
        loadTrees();
      };

      const treeModal = document.getElementById("treeModal");
      const addTreeBtn = document.getElementById("addTree");
      const treeCloseBtn = treeModal.getElementsByClassName("close")[0];

      addTreeBtn.onclick = function () {
        openModal(treeModal);
      };

      treeCloseBtn.onclick = function () {
        closeModal(treeModal);
      };

      window.onclick = function (event) {
        if (event.target == treeModal) {
          closeModal(treeModal);
        }
      };

      function openModal(modal) {
        modal.style.display = "flex";
      }

      function closeModal(modal) {
        modal.style.display = "none";
        clearModalForm();
      }

      function clearModalForm() {
        document.getElementById("treeForm").reset();
        document.getElementById("treeId").value = "";
        document.getElementById("existingTreeImage").value = "";
        document.getElementById("currentImageLabel").textContent = "";
      }

      async function loadTrees() {
        try {
          const querySnapshot = await getDocs(treesCollectionRef);
          const treeItems = document.getElementById("treeItems");
          const treeTable = document.getElementById("treeTable");
          treeItems.innerHTML = ""; // Clear existing content

          // Remove any existing no-data message
          const existingMessage = document.querySelector(".no-data-message");
          if (existingMessage) {
            existingMessage.remove();
          }

          if (querySnapshot.empty) {
            // Hide the table
            treeTable.style.display = "none";

            // Create and show no data message
            const noDataMessage = document.createElement("div");
            noDataMessage.className = "no-data-message"; // Add a class for easy selection
            noDataMessage.style.textAlign = "center";
            noDataMessage.style.padding = "2rem";
            noDataMessage.style.backgroundColor = "#fff";
            noDataMessage.style.borderRadius = "8px";
            noDataMessage.style.boxShadow = "0 4px 10px rgba(0, 0, 0, 0.1)";
            noDataMessage.innerHTML = `
        <i class="fa-solid fa-tree" style="font-size: 3rem; color: #3a9249; margin-bottom: 1rem;"></i>
        <h2 style="color: #444; margin-bottom: 0.5rem;">No Trees Available</h2>
        <p style="color: #666;">Click the + button to add your first tree.</p>
      `;
            treeItems.parentNode.parentNode.appendChild(noDataMessage);
          } else {
            // Show the table and populate data
            treeTable.style.display = "table";

            querySnapshot.forEach((doc) => {
              const data = doc.data();
              const treeRow = document.createElement("tr");
              treeRow.innerHTML = `
          <td>${data.name}</td>
          <td><img src="${data.image}" alt="${data.name}"></td>
          <td>${data.description}</td>
          <td>${data.treeCost}</td>
          <td>${data.type}</td>
          <td>${data.availableTrees}</td>
          <td class="actions">
            <button onclick="editTree('${doc.id}', '${data.name}', '${data.description}', '${data.treeCost}', '${data.type}', '${data.image}', '${data.availableTrees}')">Edit</button>
            <button class="delete" onclick="confirmDelete('${doc.id}')">Delete</button>
          </td>
        `;
              treeItems.appendChild(treeRow);
            });
          }
        } catch (error) {
          console.error("Error loading trees: ", error);
        }
      }

      async function uploadImage(file) {
        const storageRef = ref(storage, `tree_images/${file.name}`);
        await uploadBytes(storageRef, file);
        const imageUrl = await getDownloadURL(storageRef);
        return imageUrl;
      }

      async function addTree(
        name,
        description,
        treeCost,
        type,
        imageFile,
        availableTrees
      ) {
        try {
          const imageUrl = await uploadImage(imageFile);
          await addDoc(treesCollectionRef, {
            name: name,
            description: description,
            treeCost: treeCost,
            type: type,
            image: imageUrl,
            availableTrees: availableTrees,
            timestamp: serverTimestamp(),
          });
          console.log("Tree added successfully!");
          alert("Tree added successfully!");
          await loadTrees(); // Wait for trees to load before closing modal
          closeModal(treeModal);
        } catch (error) {
          console.error("Error adding tree: ", error);
          alert("Error adding tree!");
        }
      }

      async function updateTree(
        id,
        name,
        description,
        treeCost,
        type,
        imageFile,
        availableTrees
      ) {
        try {
          let imageUrl = document.getElementById("existingTreeImage").value;

          if (imageFile) {
            imageUrl = await uploadImage(imageFile);
          }

          const treeDocRef = doc(db, "trees", id);
          await updateDoc(treeDocRef, {
            name: name,
            description: description,
            treeCost: treeCost,
            type: type,
            image: imageUrl,
            availableTrees: availableTrees,
            timestamp: serverTimestamp(),
          });

          console.log("Tree updated successfully!");
          alert("Tree updated successfully!");
          await loadTrees(); // Wait for trees to load before closing modal
          closeModal(treeModal);
        } catch (error) {
          console.error("Error updating tree: ", error);
          alert("Error updating tree!");
        }
      }

      async function deleteTree(id) {
        try {
          await deleteDoc(doc(db, "trees", id));
          console.log("Tree deleted successfully!");
          alert("Tree deleted successfully!");
          await loadTrees(); // Wait for trees to load before proceeding
        } catch (error) {
          console.error("Error deleting tree: ", error);
          alert("Error deleting tree!");
        }
      }

      window.deleteTree = deleteTree;

      window.confirmDelete = function (id) {
        if (confirm("Are you sure you want to delete this tree?")) {
          deleteTree(id);
        }
      };

      window.editTree = function (
        id,
        name,
        description,
        treeCost,
        type,
        image,
        availableTrees
      ) {
        document.getElementById("treeId").value = id;
        document.getElementById("treeName").value = name;
        document.getElementById("treeDescription").value = description;
        document.getElementById("treeCost").value = treeCost;
        document.getElementById("treeType").value = type;
        document.getElementById("existingTreeImage").value = image;
        document.getElementById("availableTrees").value = availableTrees;
        document.getElementById("treeImage").value = "";
        document.getElementById(
          "currentImageLabel"
        ).textContent = `Current File: ${name} Image`;
        openModal(treeModal);
      };

      document
        .getElementById("treeImage")
        .addEventListener("change", function () {
          const file = this.files[0];
          if (file) {
            document.getElementById(
              "currentImageLabel"
            ).textContent = `Selected File: ${file.name}`;
          }
        });

      document
        .getElementById("saveTree")
        .addEventListener("click", async function () {
          const id = document.getElementById("treeId").value;
          const name = document.getElementById("treeName").value;
          const description = document.getElementById("treeDescription").value;
          const treeCost = document.getElementById("treeCost").value;
          const type = document.getElementById("treeType").value;
          const imageFile = document.getElementById("treeImage").files[0];
          const availableTrees =
            document.getElementById("availableTrees").value;

          if (id) {
            await updateTree(
              id,
              name,
              description,
              treeCost,
              type,
              imageFile,
              availableTrees
            );
          } else {
            await addTree(
              name,
              description,
              treeCost,
              type,
              imageFile,
              availableTrees
            );
          }
        });
    </script>
  </body>
</html>

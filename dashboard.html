<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeStride - Admin Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap");
      * {
        box-sizing: border-box;
        font-family: "Exo 2", "Roboto";
        font-optical-sizing: auto;
        font-display: swap;
        font-style: normal;
        padding: 0;
        margin: 0;
      }
      body {
        background: #f4f7fa;
        color: #444;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: #fff;
        color: #444;
        padding: 1em;
      }
      header h1 {
        margin: 0;
      }
      .sign-out-button {
        background: none;
        border: none;
        color: #444;
        cursor: pointer;
        font-size: 1.2em;
        display: flex;
        align-items: center;
      }
      .sign-out-button i {
        margin-right: 0.5em;
      }
      .navigation {
        display: grid;
        grid-template-columns: repeat(auto-fit, 250px);
        justify-content: space-evenly;
        align-items: center;
        margin-top: 2rem;
        margin-bottom: 2rem;
        row-gap: 1rem;
      }
      .navigation button {
        padding: 2.4em;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        background: #3a9249;
        color: #fff;
        border: 2px solid #4fbb61;
        border-radius: 1em;
        font-size: 1em;
        transition: all 0.3s ease-in;
      }
      .navigation button:hover {
        transform: scale(1.06);
      }
      .users-table-container {
        width: 80%;
        margin: auto;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        border-radius: 14px;
        margin-bottom: 2rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1em;
      }

      th,
      td {
        padding: 1em;
        border: 1px solid #ddd;
      }

      table img {
        width: 64px;
        height: 64px;
        border-radius: 50%;
      }

      #pagination-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 1em;
      }

      #pagination-controls button {
        padding: 0.5em 1em;
        margin: 0 0.5em;
        border: none;
        background-color: #4fbb61;
        border-radius: 0.3em;
        color: white;
        cursor: pointer;
      }

      #pagination-controls button:disabled {
        background-color: #ccc;
      }

      #page-info {
        font-size: 1.2em;
      }

      .action-button {
        padding: 0.5em 1em;
        border: none;
        cursor: pointer;
        font-size: 0.9em;
        border-radius: 0.3em;
      }

      .view-button {
        background-color: #4aad5b;
        color: white;
      }

      .delete-button {
        background-color: #d9534f;
        color: white;
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: grid;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        width: 360px;
        text-align: center;
      }
      .modal-content h2 {
        margin-bottom: 1rem;
      }
      .close {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 1.5em;
        cursor: pointer;
      }

      #user-details {
        display: grid;
        row-gap: 1rem;
      }
      #user-details img {
        width: 100px;
        height: 100px;
      }
      .user-list h1 {
        text-align: center;
        margin-bottom: 1rem;
      }
      .actions {
        display: grid;
        gap: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Admin Dashboard</h1>
      <button class="sign-out-button" id="sign-out">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </header>
    <main>
      <section class="navigation">
        <button onclick="window.location.href ='announcements.html'">
          ANNOUNCEMENTS
        </button>
        <button onclick="window.location.href ='mission.html'">
          MANAGE MISSION
        </button>
        <button onclick="window.location.href ='trees.html'">
          MANAGE TREES
        </button>
      </section>
      <section class="user-list">
        <h1>User List</h1>
        <div class="users-table-container">
          <table id="user-table">
            <thead>
              <tr>
                <th>Photo</th>
                <th>Username</th>
                <th>Total Points</th>
                <th>Total Steps</th>
                <th>Trees Planted</th>
                <th>Missions Completed</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-list"></tbody>
          </table>
          <div id="pagination-controls">
            <button id="prev-page">Previous</button>
            <span id="page-info"></span>
            <button id="next-page">Next</button>
          </div>
        </div>
      </section>
      <!-- User Details Modal -->
      <div id="user-modal" class="modal" style="display: none">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>User Details</h2>
          <div id="user-details">
            <p style="display: grid; margin: auto">
              <strong>Profile:</strong>
              <br> 
              <img src="" id="modal-profile"></img>
            </p>
            <p><strong>Username:</strong> <span id="modal-username"></span></p>
            <p><strong>Email:</strong> <span id="modal-email"></span></p>
            <p><strong>Phone Number:</strong> <span id="modal-phone"></span></p>
            <p style="display: grid; margin: auto">
              <strong>QR Code:</strong>
              <br />
              <img id="modal-qr" src="" alt="User QR Code" />
            </p>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://kit.fontawesome.com/ec19991922.js"
      crossorigin="anonymous"
    ></script>
    <script type="module">
      // Import the necessary Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import {
        getFirestore,
        collection,
        getDocs,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyAUIljfabkgsGO8FkLTfSNMpd7NeZW0a_M",
        authDomain: "treestride-project.firebaseapp.com",
        projectId: "treestride-project",
        storageBucket: "treestride-project.appspot.com",
        messagingSenderId: "218404996569",
        appId: "1:218404996569:web:d1daa406334c19cde5c5c8",
        measurementId: "G-XR01C3LFWD",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Check authentication state
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const email = user.email;
          if (email !== "admin@gmail.com") {
            alert("Unauthorized access. Redirecting to login.");
            window.location.href = "index.html";
          } else {
            fetchUsers();
          }
        } else {
          alert("Redirecting to login.");
          window.location.href = "index.html";
        }
      });

      // Variables for pagination
      let currentPage = 1;
      const usersPerPage = 5;
      let totalUsers = 0;
      let users = [];

      async function fetchUsers() {
        const querySnapshot = await getDocs(collection(db, "users"));
        users = querySnapshot.docs.map((doc) => {
          return { uid: doc.id, ...doc.data() };
        });
        totalUsers = users.length;
        displayUsers(currentPage);
        updatePaginationControls();
      }

      function displayUsers(page) {
        const startIndex = (page - 1) * usersPerPage;
        const endIndex = startIndex + usersPerPage;
        const usersToDisplay = users.slice(startIndex, endIndex);

        const userList = document.getElementById("user-list");
        userList.innerHTML = "";

        usersToDisplay.forEach((userData, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
      <td><img src="${userData.photoURL}" alt="${
            userData.username
          }'s photo" /></td>
      <td>${userData.username}</td>
      <td>${userData.totalPoints}</td>
      <td>${userData.totalSteps}</td>
      <td>${userData.totalTrees}</td>
      <td>${userData.missionsCompleted}</td>
      <td class="actions">
        <button class="action-button view-button" data-uid="${
          userData.uid
        }">View</button>
        <button class="action-button delete-button" data-uid="${
          userData.uid
        }" data-index="${startIndex + index}">Delete</button>
      </td>
    `;
          userList.appendChild(row);
        });

        // Attach event listeners to the view buttons
        const viewButtons = document.querySelectorAll(".view-button");
        viewButtons.forEach((button) => {
          button.addEventListener("click", async (event) => {
            const uid = event.target.getAttribute("data-uid");
            await showUserDetails(uid);
          });
        });

        // Attach event listeners to the delete buttons
        const deleteButtons = document.querySelectorAll(".delete-button");
        deleteButtons.forEach((button) => {
          button.addEventListener("click", async (event) => {
            const uid = event.target.getAttribute("data-uid");
            const index = event.target.getAttribute("data-index");
            await deleteUser(uid, index);
          });
        });
      }

      // Function to display user details in the modal
      async function showUserDetails(uid) {
        try {
          const userRef = doc(db, "users", uid); 
          const userSnap = await getDoc(userRef);
          if (userSnap.exists()) {
            const userData = userSnap.data();

            // Populate modal with user data
            document.getElementById("modal-profile").src =
              userData.photoURL;
            document.getElementById("modal-username").innerText =
              userData.username;
            document.getElementById("modal-email").innerText = userData.email;
            document.getElementById("modal-phone").innerText =
              userData.phoneNumber;
            document.getElementById("modal-qr").src = userData.userQrCode || "";

            // Show the modal
            document.getElementById("user-modal").style.display = "flex";
          } else {
            alert("User not found");
          }
        } catch (error) {
          console.error("Error fetching user: ", error);
        }
      }

      // Ensure each view button correctly triggers 'showUserDetails'
      const viewButtons = document.querySelectorAll(".view-button");

      viewButtons.forEach((button) => {
        button.addEventListener("click", async (event) => {
          const uid = event.target.getAttribute("data-uid"); 
          await showUserDetails(uid);
        });
      });

      // Close the modal when the "X" button is clicked
      document.querySelector(".close").addEventListener("click", () => {
        document.getElementById("user-modal").style.display = "none";
      });

      // Close the modal when clicking outside the modal content
      window.onclick = (event) => {
        const modal = document.getElementById("user-modal");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };

      // Attach event listeners to the delete buttons
      const deleteButtons = document.querySelectorAll(".delete-button");

      deleteButtons.forEach((button) => {
        button.addEventListener("click", async (event) => {
          const uid = event.target.getAttribute("data-uid");
          const index = event.target.getAttribute("data-index");
          await deleteUser(uid, index);
        });
      });

      // Function to delete a user from Firestore
      async function deleteUser(uid, index) {
        if (confirm("Are you sure you want to delete this user?")) {
          try {
            const userRef = doc(db, "users", uid);
            await deleteDoc(userRef);
            alert(`User deleted successfully.`);

            // Remove user from the users array and refresh display
            users.splice(index, 1);
            displayUsers(currentPage); // Re-render the user list after deletion
            updatePaginationControls(); // Update pagination after deleting
          } catch (error) {
            console.error("Error deleting user: ", error);
            alert("Failed to delete user.");
          }
        }
      }

      // Update the pagination controls
      function updatePaginationControls() {
        const totalPages = Math.ceil(totalUsers / usersPerPage);

        document.getElementById(
          "page-info"
        ).innerText = `Page ${currentPage} of ${totalPages}`;

        document.getElementById("prev-page").disabled = currentPage === 1;
        document.getElementById("next-page").disabled =
          currentPage === totalPages;
      }

      // Pagination button listeners
      document.getElementById("prev-page").addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          displayUsers(currentPage);
          updatePaginationControls();
        }
      });

      document.getElementById("next-page").addEventListener("click", () => {
        const totalPages = Math.ceil(totalUsers / usersPerPage);
        if (currentPage < totalPages) {
          currentPage++;
          displayUsers(currentPage);
          updatePaginationControls();
        }
      });

      // Sign out function
      const signOutButton = document.getElementById("sign-out");
      signOutButton.addEventListener("click", () => {
        signOut(auth)
          .then(() => {
            window.location.href = "index.html";
          })
          .catch((error) => {
            console.error("Error signing out: ", error);
          });
      });
    </script>
  </body>
</html>
